# Production Configuration

# Database - Railway PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Super admin seed
app.superadmin.email=${PMS_SUPER_ADMIN_EMAIL:admin@pms.local}
app.superadmin.password=${PMS_SUPER_ADMIN_PASSWORD:ChangeMe123!}
app.superadmin.first-name=${PMS_SUPER_ADMIN_FIRST_NAME:System}
app.superadmin.last-name=${PMS_SUPER_ADMIN_LAST_NAME:Admin}
app.superadmin.mobile-number=${PMS_SUPER_ADMIN_MOBILE:0000000000}

# Server
server.port=${PORT:8080}
