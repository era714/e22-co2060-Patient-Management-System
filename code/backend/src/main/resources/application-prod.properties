# Production Configuration

# Database - Railway PostgreSQL (transformed by DataSourceConfig)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:pms}}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:shashintha}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-minimum-256-bits-recommended-for-security}
app.jwt.expiration-ms=86400000

# Super admin seed
app.superadmin.email=${PMS_SUPER_ADMIN_EMAIL:admin@pms.local}
app.superadmin.password=${PMS_SUPER_ADMIN_PASSWORD:ChangeMe123!}
app.superadmin.first-name=${PMS_SUPER_ADMIN_FIRST_NAME:System}
app.superadmin.last-name=${PMS_SUPER_ADMIN_LAST_NAME:Admin}
app.superadmin.mobile-number=${PMS_SUPER_ADMIN_MOBILE:0000000000}

# Server
server.port=${PORT:8082}
